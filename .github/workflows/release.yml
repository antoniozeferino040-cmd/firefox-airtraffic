name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build && npx web-ext build --source-dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: air-traffic
          path: web-ext-artifacts/*.zip

  release-latest:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: air-traffic

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: Auto-generated from the latest commit on main.
          prerelease: true
          files: "*.zip"
          make_latest: false

  release-tag:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: air-traffic

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
