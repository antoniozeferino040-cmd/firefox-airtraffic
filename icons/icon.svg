<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Background -->
  <rect width="96" height="96" rx="20" fill="#0f3460"/>

  <!-- Control tower -->
  <!-- Tower base/pillar -->
  <rect x="22" y="48" width="10" height="30" rx="1" fill="#c0cfe0"/>
  <!-- Tower cab (control room) - wider top -->
  <path d="M16 42 L38 42 L36 50 L18 50 Z" fill="#e0e8f0"/>
  <!-- Tower cab windows -->
  <rect x="20" y="43" width="14" height="5" rx="1" fill="#2ecc71" opacity="0.7"/>
  <!-- Tower antenna -->
  <line x1="27" y1="34" x2="27" y2="42" stroke="#c0cfe0" stroke-width="2" stroke-linecap="round"/>
  <circle cx="27" cy="33" r="2" fill="#2ecc71" opacity="0.8"/>
  <!-- Tower base platform -->
  <rect x="18" y="76" width="18" height="4" rx="1" fill="#8ea8c4"/>

  <!-- Airplane - side view, descending/landing -->
  <g transform="translate(62,36) rotate(12)">
    <!-- Fuselage -->
    <path d="M-18,0 L14,0 L16,-1 L14,-2.5 L-18,-2.5 Z" fill="#e0e8f0"/>
    <!-- Wing -->
    <path d="M-4,-2.5 L4,-10 L8,-10 L2,-2.5 Z" fill="#c0cfe0"/>
    <!-- Tail -->
    <path d="M-18,-2.5 L-22,-9 L-18,-9 L-16,-2.5 Z" fill="#c0cfe0"/>
    <!-- Tail fin horizontal -->
    <path d="M-18,-2.5 L-22,-4 L-22,-3 L-18,-1.5 Z" fill="#a0b8d0"/>
    <!-- Windows -->
    <line x1="-10" y1="-1.2" x2="10" y2="-1.2" stroke="#2ecc71" stroke-width="0.8" opacity="0.5" stroke-dasharray="1.5 1.5"/>
    <!-- Nose -->
    <circle cx="15" cy="-1.2" r="0.8" fill="#2ecc71" opacity="0.6"/>
  </g>

  <!-- Landing path (dashed arc) -->
  <path d="M76 34 Q60 52 40 58" stroke="#2ecc71" stroke-width="1.2" stroke-dasharray="3 3" fill="none" opacity="0.4"/>

  <!-- Runway -->
  <rect x="34" y="78" width="48" height="3" rx="1" fill="#8ea8c4" opacity="0.6"/>
  <!-- Runway markings -->
  <line x1="40" y1="79.5" x2="44" y2="79.5" stroke="#c0cfe0" stroke-width="1" opacity="0.6"/>
  <line x1="50" y1="79.5" x2="54" y2="79.5" stroke="#c0cfe0" stroke-width="1" opacity="0.6"/>
  <line x1="60" y1="79.5" x2="64" y2="79.5" stroke="#c0cfe0" stroke-width="1" opacity="0.6"/>
  <line x1="70" y1="79.5" x2="74" y2="79.5" stroke="#c0cfe0" stroke-width="1" opacity="0.6"/>
</svg>
